<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#fff;
color:#0d0d0d;
overflow-x:hidden;
}

/* Header */
.header{
max-width:1200px;
margin:auto;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo svg{
height:60px;
}

/* Hero */
.hero{
max-width:1200px;
margin:auto;
padding:40px 20px;
display:flex;
justify-content:space-between;
gap:40px;
align-items:center;
}

/* Left */
.left{
flex:1;
}

.left h1{
font-size:44px;
font-weight:700;
margin:20px 0;
background: linear-gradient(90deg, #1a73e8, #ea4335, #34a853);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.left p{
color:#0d0d0d;
line-height:1.7;
max-width:480px;
margin-bottom:20px;
}

/* Email */
.email{
display:flex;
align-items:center;
gap:8px;
font-size:15px;
color:#0d0d0d;
}

.email svg{
width:18px;
height:18px;
}

.email a{
text-decoration:none;
color:#0d0d0d;
}

/* Signature */
.signature{
margin-top:40px;
font-size:34px;
font-family:'Great Vibes', cursive;
}

.name{
font-size:14px;
color:#0d0d0d;
}

/* Right */
.right{
flex:1;
position:relative;
height:500px;
}

/* Blocks */
.block{
width:70px;
height:70px;
background:#f1f3f4;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:600;
border-radius:12px;
position:absolute;
box-shadow: blue 0px 0px 0px 2px inset, rgb(255, 255, 255) 10px -10px 0px -3px, rgb(31, 193, 27) 10px -10px, rgb(255, 255, 255) 20px -20px 0px -3px, rgb(255, 217, 19) 20px -20px, rgb(255, 255, 255) 30px -30px 0px -3px, rgb(255, 156, 85) 30px -30px, rgb(255, 255, 255) 40px -40px 0px -3px, rgb(255, 85, 85) 40px -40px;
transition:0.3s;
}

/* Random layout */
.b1{top:30px; left:80px;}
.b2{top:90px; right:40px;}
.b3{top:160px; left:140px;}
.b4{top:220px; right:80px;}
.b5{top:300px; left:60px;}
.b6{top:360px; right:30px;}
.b7{top:430px; left:180px;}

.block:hover{
transform:scale(1.1);
}

/* 🎨 7 COLORS */
.blue{color:#4285f4;}
.red{color:#ea4335;}
.green{color:#34a853;}
.yellow{color:#fbbc05;}
.purple{color:#a142f4;}
.cyan{color:#00acc1;}
.orange{color:#ff6d00;}

/* Mobile */
@media(max-width:768px){

.hero{
flex-direction:column;
text-align:center;
}

.right{
position:static;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
height:auto;
margin-top:40px;
}

.block{
position:static;
width:60px;
height:60px;
font-size:32px;
}

.left p{
margin:auto;
}

.email{
justify-content:center;
margin-top: 15px;
}

.left h1{
font-size:30px;
}
}
    .nav a{
text-decoration:none;
color:#0d0d0d;
font-weight:400;
}
</style>
</head>
