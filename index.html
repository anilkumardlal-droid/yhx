<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xelry.com - Premium Domain</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="./video/background.mp4" type="video/mp4">

  <!-- OVERLAY -->
  <div class="video-overlay"></div>

  <!-- LIGHT -->
  <div class="light"></div>

  <!-- HERO -->
  <section class="hero">

    <div class="container">

      <div class="badge">
        ✦ Premium Domain Available
      </div>

      <h1>
        <span class="domain">xelry.com</span>
        <span class="sale">for sale</span>
      </h1>

      <h2>
        Future-ready domain for modern digital brands
      </h2>

      <p class="desc">
        Short, memorable and globally brandable — perfect for startups,
        SaaS platforms, AI products and next-generation internet businesses
        looking for a powerful global identity.
      </p>

      <div class="features">
        <div class="feature">⚡ Premium Brand</div>
        <div class="feature">🌍 Global Identity</div>
        <div class="feature">🚀 Startup Ready</div>
      </div>

      <div class="buttons">
        <button class="btn primary">Buy Now</button>
        <button class="btn secondary">Make Offer</button>
      </div>

    </div>

  </section>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
