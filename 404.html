<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting — YHX.IN</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,
body{
width:100%;
height:100%;
overflow:hidden;
}

body{

font-family:"Nunito",sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background-color:#eaf4fb;

background-image:
linear-gradient(
rgba(234,244,251,.55),
rgba(234,244,251,.55)
),
url('images/overlay-1.png');

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:#1e3547;

position:relative;

padding:20px;

}

.card{

position:relative;

width:min(92%,560px);

padding:46px 36px;

background:#ffffff;

border:1px solid #e4edf5;

border-radius:20px;

overflow:hidden;

text-align:center;

box-shadow:
0px 0px 50px rgba(0,0,0,.05);

}

/* ========================================= */

.label{

display:inline-flex;

align-items:center;
justify-content:center;

padding:10px 18px;

margin-bottom:24px;

background:#f4f8fc;

border:1px solid #e4edf5;

border-radius:12px;

font-size:11px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

color:#3850d5;

line-height:1.2;

}

/* ========================================= */

h1{

font-size:58px;

line-height:1.05;

font-weight:700;

letter-spacing:-2px;

margin-bottom:18px;

color:#1e3547;

}

.gradient{
color:#3850d5;
font-weight:700;
}

/* ========================================= */

.desc{

font-size:15px;

line-height:1.9;

color:#6b7b88;

margin-bottom:34px;

max-width:460px;

margin-left:auto;
margin-right:auto;

}

/* ========================================= */

.timer{

display:flex;
justify-content:center;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

/* ========================================= */

.count{

width:46px;
height:46px;

display:flex;
justify-content:center;
align-items:center;

border-radius:50%;

background:#ffffff;

border:1px solid #dbe7f2;

font-size:22px;

font-weight:600;

color:#3850d5;

box-shadow:
0px 0px 40px rgba(0,0,0,.04);

animation:none;

}

/* ========================================= */

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.08);
opacity:.7;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* ========================================= */

@media(max-width:768px){

body{
padding:18px;
}

.card{
padding:40px 24px;
border-radius:26px;
}

.label{
font-size:10px;
letter-spacing:3px;
}

h1{
font-size:48px;
letter-spacing:-2px;
}

.desc{
font-size:14px;
line-height:1.8;
}

.count{
width:78px;
height:78px;
font-size:30px;
}

.text{

font-size:12px;

font-weight:700;

letter-spacing:2px;

text-transform:uppercase;

color:#7b8794;

}

}

@media(max-width:480px){

.card{
padding:34px 20px;
}

h1{
font-size:40px;
}

.desc{
font-size:13px;
}

.count{
width:68px;
height:68px;
font-size:24px;
}

.label{
font-size:9px;
letter-spacing:2px;
}

}

</style>

</head>
<body>

<div class="card">

<div class="label">
Official YHX.IN Gateway
</div>

<h1>
Redirecting<br>
<span class="gradient">
Securely
</span>
</h1>

<p class="desc">
You are being redirected to the official YHX.IN destination. Please wait while the secure routing process completes.
</p>

<div class="timer">

<div class="count" id="count">
5
</div>

<div class="text">
Seconds Remaining
</div>

</div>

</div>

<script>

let time = 5;

let counter = document.getElementById("count");

counter.textContent = time;

let interval = setInterval(function(){

time--;

counter.textContent = time;

if(time <= 0){

clearInterval(interval);

window.location.href = "/";

}

},1000);

</script>

</body>
</html>
