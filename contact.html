<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YHX.IN — Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--bg:#050505;
--panel:rgba(15,23,42,.82);
--border:rgba(255,255,255,.08);
--text:#ffffff;
--muted:#94a3b8;
--blue:#38bdf8;
--blue2:#2563eb;
}

html,
body{
width:100%;
overflow-x:hidden;
scroll-behavior:smooth;
background-color:#eaf4fb !important;
}

body{

font-family:"Nunito",sans-serif;

background:url('images/overlay-1.png');

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

color:#1e3547;

min-height:100vh;

}

/* ================================================= */



.g1{
width:450px;
height:450px;
background:#2563eb;
top:-150px;
left:-120px;

opacity:.18;
filter:blur(140px);
}

.g2{
width:400px;
height:400px;
background:#38bdf8;
bottom:-160px;
right:-120px;

opacity:.18;
filter:blur(140px);
}



.l1{
width:320px;
top:140px;
left:0;
}

.l2{
width:240px;
bottom:180px;
right:0;
}

/* ================================================= */

main{

width:100%;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:40px 20px;
}

/* ================================================= */

.card{

position:relative;

width:100%;
max-width:920px;

padding:50px;

background:#ffffff;

border-radius:24px;

box-shadow:
0px 0px 50px 0px rgba(0,0,0,.05);

border:1px solid #eef2f7;

overflow:hidden;

}

.card::before{

content:"";

position:absolute;

top:-40%;
left:50%;

transform:translateX(-50%);

width:420px;
height:240px;

background:
radial-gradient(circle, rgba(56,189,248,.16), transparent 70%);

filter:blur(70px);
}

/* ================================================= */

.logo{
font-size:64px;
font-weight:800;
color:#1e3547;
}

.logo span{
color:#3850d5;
text-shadow:none;
}

.logo span{

font-size:.62em;

font-weight:700;

vertical-align:top;

margin-left:4px;

color:#38bdf8;

text-shadow:
0 0 20px rgba(56,189,248,.5);
}

.sub{
font-size:16px;
line-height:1.8;
color:#828f99;
margin-bottom:30px;
}

/* ================================================= */

/* ================================================= */

.form-grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;
}

.field{

display:flex;
flex-direction:column;
}

.full{
grid-column:span 2;
}

label{
font-size:13px;
margin-bottom:10px;
font-weight:700;
letter-spacing:1px;
color:#1e3547;
}

label span{
color:#ff3b30;
}

/* ================================================= */

input,
textarea,
select{

width:100%;

padding: 8px 12px;

background:#ffffff;

border:1px solid #d6dade;

border-radius:6px;

color:#1e3547;

font-size:15px;

font-family:"Nunito",sans-serif;

transition:.3s;

box-shadow:none;
}

input:focus,
textarea:focus,
select:focus{

outline:none;

border-color:#3850d5;

box-shadow:
0 0 0 4px rgba(56,80,213,.10);

}

select{

appearance:none;
-webkit-appearance:none;
-moz-appearance:none;

background-color:#ffffff;

color:#1e3547;

border:1px solid #d6dade;

}

option{
background:#ffffff;
color:#1e3547;
}

textarea{

height:140px;

resize:none;
}

.iti{
width:100%;
}

.iti input{

width:100% !important;

padding: 8px 12px;

padding-left:90px !important;

border-radius:6px;

}

.iti__selected-flag{

padding:0 14px 0 16px !important;

border-right:1px solid #d6dade;

margin-right:10px;

}

.iti--separate-dial-code .iti__selected-dial-code{

margin-left:8px;

font-size:14px;

color:#1e3547;

}

/* ================================================= */

.note{

margin-top:10px;

font-size:12px;

line-height:1.8;

color:#97a0b5;
}

.phone-error{

margin-top:10px;

font-size:12px;

color:#ff4d4d;

display:none;
}

/* ================================================= */

.submit{

width:100%;

padding:14px 28px;

margin-top:28px;

border:none;

outline:none;

cursor:pointer;

font-size:15px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

font-family:"Nunito",sans-serif;

border-radius:14px;

background:#3850d5;

color:#ffffff;

transition:all .3s ease;

box-shadow:
0 15px 35px rgba(56,80,213,.18);

}

.submit:hover{

transform:translateY(-2px);

background:#2f46c7;

box-shadow:
0 20px 45px rgba(56,80,213,.22);

}
/* ================================================= */

.wait{

margin-top:16px;

text-align:center;

font-size:13px;

line-height:1.9;

color:#9ba3b5;
}

/* ================================================= */

.success{

display:none;

text-align:center;

padding:100px 20px;
}

.success h2{

font-size:58px;

margin-bottom:18px;
}

.success p{

font-size:18px;

line-height:1.9;

color:var(--muted);
}

.timer{

margin-top:30px;

font-size:72px;

font-weight:700;

color:#38bdf8;

text-shadow:
0 0 30px rgba(56,189,248,.25);
}

/* ================================================= */

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

line-height:1.8;

color:#8b93a6;
}

.footer a{

color:#7dd3fc;

text-decoration:none;

font-weight:700;
}

/* ================================================= */

@keyframes shine{

0%{
transform:
translateX(-140%)
rotate(25deg);
}

100%{
transform:
translateX(220%)
rotate(25deg);
}

}

/* ================================================= */

@media(max-width:768px){

.card{

padding:24px;

clip-path:none;
}

.logo{
font-size:38px;
}

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

.success h2{
font-size:40px;
}

.timer{
font-size:52px;
}

.submit{

width:100%;

height:58px;

margin-top:28px;

border:none;

cursor:pointer;

font-size:15px;
font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

border-radius:14px;

background:#3850d5;

color:white;

transition:.3s;

box-shadow:
0 15px 35px rgba(56,80,213,.18);

clip-path:none;

}

.submit:hover{

transform:translateY(-3px);

background:#2b44cd;

}

}

/* intl tel input dark dropdown */

.iti__country-list{

background:#ffffff !important;

border:1px solid #d6dade !important;

color:#1e3547 !important;

box-shadow:
0 10px 35px rgba(0,0,0,.08) !important;

border-radius:10px !important;

}

.iti__country{

color:#1e3547 !important;

padding:10px 14px !important;

transition:.25s;

}

.iti__country:hover{

background:#eaf4fb !important;

}

.iti__dial-code{

color:#6b7b88 !important;

}

.iti__divider{

border-bottom:1px solid #eef2f7 !important;

}

.iti__search-input{

background:#ffffff !important;

color:#1e3547 !important;

border:1px solid #d6dade !important;

border-radius:8px !important;

}

.iti__search-input::placeholder{

color:#97a0b5 !important;

}


@keyframes bgMove{

0%{
transform:scale(1);
}

100%{
transform:scale(1.05);

}

}

/* PRELOADER */

.preloader{

background:#eaf4fb;

height:100%;

left:0;

position:fixed;

right:0;

top:0;

width:100%;

z-index:9999999;

}

.status{

position:absolute;

width:50px;
height:50px;

border-radius:15px;

animation:rotation 1s infinite;

z-index:9;

top:50%;
left:50%;

margin:-25px 0 0 -25px;

}

.status .shape{

position:absolute;

width:20px;
height:20px;

border-radius:10px;

}

.status .shape.shape-1{
left:0;
background-color:#10a6ba;
}

.status .shape.shape-2{
right:0;
background-color:#3850d5;
}

.status .shape.shape-3{
bottom:0;
background-color:#10a6ba;
}

.status .shape.shape-4{
bottom:0;
right:0;
background-color:#3850d5;
}

.status .shape-1{
animation:shape1 .5s infinite alternate;
}

.status .shape-2{
animation:shape2 .5s infinite alternate;
}

.status .shape-3{
animation:shape3 .5s infinite alternate;
}

.status .shape-4{
animation:shape4 .5s infinite alternate;
}

@keyframes rotation{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes shape1{

from{
transform:translate(0,0);
}

to{
transform:translate(40px,40px);
}

}

@keyframes shape2{

from{
transform:translate(0,0);
}

to{
transform:translate(-40px,40px);
}

}

@keyframes shape3{

from{
transform:translate(0,0);
}

to{
transform:translate(40px,-40px);
}

}

@keyframes shape4{

from{
transform:translate(0,0);
}

to{
transform:translate(-40px,-40px);
}

}
</style>

</head>

<body>
    
<div class="preloader">
    <div class="status">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>
</div>

<main>

<div class="card">

<div class="logo">
YHX<span>.IN</span>
</div>

<p class="sub">
Secure your next-generation premium domain identity for AI, SaaS, futuristic startups, and global technology platforms.
</p>

<!-- STATS -->

<div class="stats">

<div class="stat">

<!-- FORM -->

<form id="form" onsubmit="sendMail(event)">
    
<input
type="text"
id="website"
autocomplete="off"
style="display:none">

<div class="form-grid">

<div class="field">

<label>
First Name <span>*</span>
</label>

<input
id="fname"
type="text"
required
minlength="2"
maxlength="30"
pattern="^[A-Za-z ]+$"
autocomplete="off">

</div>

<div class="field">

<label>
Last Name <span>*</span>
</label>

<input
id="lname"
type="text"
required
minlength="2"
maxlength="30"
pattern="^[A-Za-z ]+$"
autocomplete="off">

</div>

<div class="field">

<label>
Email Address <span>*</span>
</label>

<input type="email" id="email" required>

</div>

<div class="field">

<label>
Telephone Number <span>*</span>
</label>

<input id="phone" type="tel" required>

<div class="phone-error" id="phoneError">
Invalid phone number
</div>

</div>

<div class="field">

<label>
Offer <span>*</span>
</label>

<input
type="number"
id="offer"
min="300"
max="999999999"
required>

<span class="note" id="minNote">
Minimum offer loading...
</span>

</div>

<div class="field">

<label>
Currency <span>*</span>
</label>

<select id="currency" required>

<option value="" disabled selected>
Select
</option>

<option value="USD">
USD
</option>

<option value="INR">
INR
</option>

</select>

</div>

<div class="field full">

<label>
Message <span>*</span>
</label>

<textarea id="message" required></textarea>

</div>

<!-- CAPTCHA -->

<div 
class="cf-turnstile full"
data-sitekey="0x4AAAAAADOnvYn6E_DaUl2Q">
</div>

</div>

<button class="submit" id="submitBtn" type="submit">
Send Inquiry
</button>

<p class="wait">
Please wait while we securely verify and process your inquiry.
</p>

</form>

<!-- SUCCESS -->

<div class="success" id="successBox"></div>

<div class="footer">

Need help? Contact directly at

<a href="mailto:contact@yhx.in">
contact@yhx.in
</a>

</div>

</div>

</main>

<script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>

<script>

(function(){

emailjs.init("RA7Yehviqu_UNulcU");

})();

const phoneInput=document.querySelector("#phone");

const iti=window.intlTelInput(
phoneInput,
{

initialCountry:"auto",

separateDialCode:true,

strictMode:true,

geoIpLookup:function(callback){

fetch("https://ipwho.is/")
.then(res=>res.json())
.then(data=>callback(data.country_code))
.catch(()=>callback("IN"));

},

utilsScript:
"https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"

});

const phoneError=document.getElementById("phoneError");

/* ================================================= */

function validatePhone(){

const value=phoneInput.value.trim();

if(value.length<6){

phoneError.style.display="block";

return false;

}

if(
/(\d)\1{6,}/.test(
iti.getNumber()
)
){

phoneError.innerText =
"Fake phone number";

phoneError.style.display =
"block";

return false;

}

if(!iti.isValidNumber()){

phoneError.style.display="block";

return false;

}

phoneError.style.display="none";

return true;

}

phoneInput.addEventListener("keyup",validatePhone);

phoneInput.addEventListener("blur",validatePhone);

/* ================================================= */

let minINR=28000;

async function getRate(){

try{

const res=await fetch(
"https://api.frankfurter.app/latest?from=USD&to=INR"
);

const data=await res.json();

const usdToInr=data.rates.INR;

const minUSD=300;

minINR=Math.round(minUSD*usdToInr);

document.getElementById("minNote").innerText=
"Minimum: $" + minUSD + " (≈ ₹" + minINR + ")";

}catch{

document.getElementById("minNote").innerText=
"Minimum: $300 (≈ ₹" + minINR + ")";

}

}

getRate();

/* ================================================= */

async function setCurrencyByCountry(){

try{

const res=await fetch("https://ipwho.is/");
const data=await res.json();

if(data.country_code==="IN"){

currency.value="INR";

}else{

currency.value="USD";

}

}catch{

currency.value="USD";

}

}

window.addEventListener(
"load",
setCurrencyByCountry
);

/* ================================================= */

function sendMail(e){

const blockedDomains = [
"mailinator.com",
"10minutemail.com",
"guerrillamail.com",
"tempmail.com",
"fakeinbox.com"
];

const emailValue =
email.value
.trim()
.toLowerCase();

const emailDomain =
emailValue.split("@")[1];

if(
blockedDomains.includes(emailDomain)
){

alert(
"Disposable emails are blocked"
);

return;

}
    
if(
document.getElementById("website").value
){
return;
}

e.preventDefault();

const tokenInput=document.querySelector(
'[name="cf-turnstile-response"]'
);

if(!tokenInput || !tokenInput.value){

alert("Please verify you are human");

return;

}

if(
message.value.trim().length < 10
){

alert(
"Message too short"
);

message.focus();

return;

}
    
if(!validatePhone()){

phoneInput.focus();

return;

}

const offerValue=parseFloat(offer.value);
const currencyValue=currency.value;

if(currencyValue==="USD" && offerValue<300){

alert("Minimum $300");

return;

}

if(currencyValue==="INR" && offerValue<minINR){

alert("Minimum ₹" + minINR);

return;

}

/* ================================================= */
/* WAIT SCREEN */
/* ================================================= */

submitBtn.disabled = true;
submitBtn.innerText = "Processing...";

form.style.display="none";

successBox.style.display="block";

successBox.innerHTML=`

<h2>
Please Wait
</h2>

<p>
Your message is being securely processed and verified by our system.
</p>

<div class="timer" id="timer">
8
</div>

`;

let wait = 8;

const waitInterval=setInterval(()=>{

document.getElementById("timer").innerText=--wait;

if(wait<=0){

clearInterval(waitInterval);

/* ================================================= */
/* SEND EMAIL */
/* ================================================= */

const params={

fname:fname.value,
lname:lname.value,

email:email.value,

phone:iti.getNumber(),

offer:offer.value,

currency:currency.value,

message:message.value,

domain:"YHX.in"

};

emailjs.send(
"service_y231ani",
"template_fin8z5k",
params
)

.then(()=>{

/* ================================================= */
/* SUCCESS */
/* ================================================= */

successBox.innerHTML=`

<h2>
Message Sent Successfully
</h2>

<p>
Thank you for contacting YHX.IN.<br>
Our acquisition team has received your inquiry successfully.
</p>

<div class="timer" id="timer2">
5
</div>

`;

let redirect = 5;

const redirectInterval=setInterval(()=>{

document.getElementById("timer2").innerText=--redirect;

if(redirect<=0){

clearInterval(redirectInterval);

window.location.href="/";

}

},1000);

})

.catch(()=>{

successBox.innerHTML=`

<h2>
Failed To Send
</h2>

<p>
Something went wrong.<br>
Please refresh and try again.
</p>

`;

});

}

},1000);

}

</script>

<script>

window.addEventListener("load",function(){

document.querySelector(".preloader").style.display="none";

});

</script>

</body>
</html>
