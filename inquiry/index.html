<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Make an Offer or Inquiry for Go7.in Domain</title>

<meta name="description" content="Make an offer or inquiry for Go7.in domain. Buy directly from owner with fast, secure transfer. Serious buyers only.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#ffffff;color:#0d0d0d;}

.header{
max-width:1200px;
margin:auto;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo svg{height:60px;}

.nav a{
margin-left:20px;
text-decoration:none;
color:#0d0d0d;
font-size:14px;
font-weight:500;
}
.nav a:hover{color:#1a73e8;}

.container{
max-width:980px;
margin:40px auto;
padding:30px;
background:#fff;
border-radius:12px;
}

h2{
text-align:center;
margin-bottom:10px;
background:linear-gradient(90deg,#a855f7,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

#priceBox{
text-align:center;
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.field{display:flex;flex-direction:column;}
label{font-size:13px;margin-bottom:6px;}
label span{color:#ff4d4f;}

input,select,textarea{
padding:12px;
border:1px solid #d8dae0;
border-radius:8px;
background:#F9F9F9;
}

textarea{height:120px;}
.full{grid-column:span 2;}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#4f46e5,#6d28d9);
color:#fff;
font-weight:500;
cursor:pointer;
transition:all .3s;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
}

button:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 12px 30px rgba(0,0,0,0.18);
}

button:active{transform:scale(.96);}

button::after{
content:"";
position:absolute;
top:0;left:-100%;
width:100%;height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
transition:.5s;
}

button:hover::after{left:100%;}

.success{display:none;text-align:center;padding:40px;}
.timer{font-size:22px;color:#ff4d4f;margin-top:10px;}

.icon-part{opacity:0;transform:translateY(10px);animation:iconIn .6s forwards;}
.icon-part:nth-child(1){animation-delay:.1s;}
.icon-part:nth-child(2){animation-delay:.2s;}
.icon-part:nth-child(3){animation-delay:.3s;}
.icon-part:nth-child(4){animation-delay:.4s;}

.logo-text{opacity:0;transform:translateX(20px);animation:textIn .8s forwards .5s;}

@keyframes iconIn{to{opacity:1;transform:translateY(0);}}
@keyframes textIn{to{opacity:1;transform:translateX(0);}}

.iti{width:100%;}
.iti input{width:100%!important;padding-left:50px!important;}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
.full{grid-column:span 1;}
}
</style>
</head>

<body>

<div class="header">
<div class="logo">
<svg viewBox="0 0 520 180">
<g transform="translate(40,50) rotate(-12)">
<polygon class="icon-part" points="0,40 18,22 18,58" fill="#111"/>
<polygon class="icon-part" points="28,22 54,0 54,80 28,58" fill="#111"/>
<polygon class="icon-part" points="64,22 90,0 90,80 64,58" fill="#111"/>
<polygon class="icon-part" points="100,22 126,0 126,80 100,58" fill="#111"/>
</g>
<text class="logo-text" x="200" y="105" font-size="68" fill="#111" font-weight="600">GO7</text>
</svg>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/about">About</a>
</div>
</div>

<div class="container">
<h2>Make an offer or inquiry for this domain</h2>

<p id="priceBox">$499</p>

<form id="form" onsubmit="sendMail(event)">
<div class="grid">

<div class="field">
<label>First Name <span>*</span></label>
<input id="fname" required>
</div>

<div class="field">
<label>Last Name <span>*</span></label>
<input id="lname" required>
</div>

<div class="field">
<label>Email Address <span>*</span></label>
<input type="email" id="email" required>
</div>

<div class="field">
<label>Telephone Number <span>*</span></label>
<input id="phone" type="tel" required>
</div>

<div class="field">
<label>Offer <span>*</span></label>
<input type="number" id="offer" min="50" required>
</div>

<div class="field">
<label>Currency <span>*</span></label>
<select id="currency" required>
<option value="" disabled selected>Select</option>
<option value="USD">USD</option>
<option value="INR">INR</option>
</select>
</div>

<div class="field">
<label>Domain</label>
<input value="Go7.in" readonly>
</div>

<div class="field full">
<label>Message <span>*</span></label>
<textarea id="message" required></textarea>
</div>

<div class="cf-turnstile full" id="captchaBox" style="display:none;" data-sitekey="0x4AAAAAACv6bw4Unpy1xqim"></div>

</div>

<button type="submit" id="submitBtn">Send Inquiry</button>
</form>

<div class="success" id="successBox">
<h2>Thank you! 🎉</h2>
<p>Your inquiry has been sent successfully.</p>
<div class="timer" id="timer">5</div>
</div>

</div>

<script>
(function(){emailjs.init("RA7Yehviqu_UNulcU");})();

const inputs=document.querySelectorAll("#form input,#form textarea,#form select");
inputs.forEach(i=>i.addEventListener("input",checkForm));

function checkForm(){
let c=0;
if(fname.value.trim())c++;
if(lname.value.trim())c++;
if(email.value.trim())c++;
if(iti.isValidNumber())c++;
if(offer.value.trim())c++;
if(currency.value)c++;
if(message.value.trim())c++;
if(c>=4)document.getElementById("captchaBox").style.display="block";
}

function setCurrency(country){
const map={IN:"INR",US:"USD",GB:"USD",CA:"USD",AU:"USD"};
currency.value=map[country]||"USD";
}

function setPrice(country){
const priceUSD=499;
if(country==="IN"){
const inr=Math.round(priceUSD*83);
priceBox.innerText="₹"+inr.toLocaleString();
}else{
priceBox.innerText="$"+priceUSD;
}
}

function sendMail(e){
e.preventDefault();

const token=document.querySelector('[name="cf-turnstile-response"]');
if(!token||!token.value)return alert("Verify you are human");

if(!iti.isValidNumber())return alert("Enter valid phone number");

if(parseFloat(offer.value)<50)return alert("Minimum $50");

emailjs.send("service_y231ani","template_fin8z5k",{
fname:fname.value,
lname:lname.value,
email:email.value,
phone:iti.getNumber(),
offer:offer.value,
currency:currency.value,
message:message.value,
domain:"Go7.in"
})
.then(()=>{
form.style.display="none";
successBox.style.display="block";
let t=5;
const i=setInterval(()=>{
timer.innerText=--t;
if(t<=0){clearInterval(i);location="/";}
},1000);
})
.catch(()=>alert("Failed"));
}

const iti=window.intlTelInput(document.querySelector("#phone"),{
initialCountry:"auto",
geoIpLookup:cb=>{
fetch("https://ipapi.co/json")
.then(r=>r.json())
.then(d=>{
cb(d.country_code);
setCurrency(d.country_code);
setPrice(d.country_code);
})
.catch(()=>cb("IN"));
},
utilsScript:"https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
});
</script>

</body>
</html>
