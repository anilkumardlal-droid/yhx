<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Domain Inquiry</title>

<style>
body{font-family:Arial;background:#fff;padding:30px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field{display:flex;flex-direction:column;}
label{font-size:13px;margin-bottom:6px;}
label span{color:red;}
input,textarea{padding:10px;border:1px solid #ccc;border-radius:6px;}
.full{grid-column:span 2;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}}
</style>
</head>

<body>

<form>
<div class="grid">

<div class="field">
<label>Domain</label>
<input value="Go7.in" readonly>
</div>

<!-- QUESTION -->
<div id="companyQuestion" style="font-size:13px; margin-top:6px;">
<span>Do you represent a company? <span style="color:red;">*</span></span>

<label style="margin-left:10px;">
<input type="radio" name="isCompany" value="no" checked onclick="hideCompany()"> No
</label>

<label style="margin-left:10px;">
<input type="radio" name="isCompany" value="yes" onclick="showCompany()"> Yes
</label>
</div>

<!-- COMPANY FIELD -->
<div class="field" id="companyField" style="display:none;">
<label>Company Name <span>*</span></label>
<input id="companyName">
</div>

<div class="field full">
<label>Message <span>*</span></label>
<textarea></textarea>
</div>

</div>
</form>

<script>

function showCompany(){
document.getElementById("companyQuestion").style.display="none";
document.getElementById("companyField").style.display="block";
}

function hideCompany(){
document.getElementById("companyField").style.display="none";
document.getElementById("companyQuestion").style.display="block";
}

</script>

</body>
</html>
