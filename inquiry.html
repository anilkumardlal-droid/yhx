<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inquiry - Go7.in</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#ffffff;color:#0d0d0d;}

/* HEADER */
.header{
max-width:1200px;
margin:auto;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo svg{
height:60px;
width:auto;
display:block;
}

.nav a{
margin-left:20px;
text-decoration:none;
color:#0d0d0d;
font-size:14px;
}
.nav a:hover{color:#1a73e8;}

/* FORM */
.container{
max-width:1200px;
margin:40px auto;
background:#ffffff;
padding:30px;
border-radius:12px;
}

h2{
text-align:center;
margin-bottom:30px;
background:linear-gradient(90deg,#a855f7,#3b82f6);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.field{display:flex;flex-direction:column;}
label{font-size:13px;margin-bottom:6px;}

input,select,textarea{
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

textarea{height:120px;resize:none;}
.full{grid-column:span 2;}

.radio{display:flex;gap:15px;margin-top:8px;}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:linear-gradient(135deg,#6366f1,#7c3aed);
color:#fff;
font-weight:500;
cursor:pointer;
}
button:hover{transform:translateY(-2px);}

.note{font-size:12px;color:#888;margin-top:4px;}

/* SUCCESS */
.success{
display:none;
text-align:center;
padding:40px;
}

.timer{
font-size:22px;
color:#ff4d4f;
font-weight:600;
margin-top:10px;
}

/* SVG ANIMATION */
.icon-part {
opacity: 0;
transform: translateY(10px);
animation: iconIn 0.6s ease forwards;
}
.icon-part:nth-child(1){ animation-delay:0.1s; }
.icon-part:nth-child(2){ animation-delay:0.2s; }
.icon-part:nth-child(3){ animation-delay:0.3s; }
.icon-part:nth-child(4){ animation-delay:0.4s; }

.logo-text {
opacity: 0;
transform: translateX(20px);
animation: textIn 0.8s ease forwards;
animation-delay:0.5s;
}

@keyframes iconIn {
to {opacity: 1; transform: translateY(0);}
}
@keyframes textIn {
to {opacity: 1; transform: translateX(0);}
}

/* MOBILE */
@media(max-width:768px){
.grid{grid-template-columns:1fr;}
.full{grid-column:span 1;}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="logo">
<svg viewBox="0 0 520 180" xmlns="http://www.w3.org/2000/svg">

<g transform="translate(40,50) rotate(-12)">
  <polygon class="icon-part" points="0,40 18,22 18,58" fill="#111"/>
  <polygon class="icon-part" points="28,22 54,0 54,80 28,58" fill="#111"/>
  <polygon class="icon-part" points="64,22 90,0 90,80 64,58" fill="#111"/>
  <polygon class="icon-part" points="100,22 126,0 126,80 100,58" fill="#111"/>
</g>

<text class="logo-text"
      x="200" y="105"
      font-family="Inter, sans-serif"
      font-size="68"
      fill="#111">
  go7
</text>

</svg>
</div>

<div class="nav">
<a href="/">Home</a>
<a href="/about">About</a>
</div>

</div>

<!-- FORM -->
<div class="container">

<h2>Send your inquiry regarding this domain</h2>

<form id="form" onsubmit="sendMail(event)">

<div class="grid">

<div class="field">
<label>First Name *</label>
<input id="fname" required>
</div>

<div class="field">
<label>Last Name *</label>
<input id="lname" required>
</div>

<div class="field">
<label>Email Address *</label>
<input type="email" id="email" required>
</div>

<div class="field">
  <label>Country Code *</label>
  <input value="+91" id="code" required>
</div>

<div class="field">
<label>Telephone Number *</label>
<input id="phone" required>
</div>

<div class="field">
<label>Offer *</label>
<input type="number" id="offer" required>
<span class="note">Minimum: $50.00 (fixed)</span>
</div>

<div class="field">
<label>Currency *</label>
<select id="currency">
<option>Select</option>
<option>USD</option>
<option>INR</option>
</select>
</div>

<div class="field">
<label>Domain</label>
<input value="Go7.in" readonly>
</div>

<div class="field full">
<label>Do you represent a company? *</label>
<div class="radio">
<label><input type="radio" name="rep" value="Yes"> Yes</label>
<label><input type="radio" name="rep" value="No" checked> No</label>
</div>
</div>

<div class="field full">
<label>Message *</label>
<textarea id="message" required></textarea>
</div>

<div class="cf-turnstile full" data-sitekey="YOUR_SITE_KEY"></div>

</div>

<button type="submit">Send Inquiry</button>
</form>

<!-- SUCCESS -->
<div class="success" id="successBox">
<h2>Thank you! 🎉</h2>
<p>Your inquiry has been sent successfully.</p>
<p>Redirecting to homepage in</p>
<div class="timer" id="timer">5</div>
</div>

</div>

<script>
(function(){
emailjs.init("YOUR_PUBLIC_KEY");
})();

function sendMail(e){
e.preventDefault();

let token = document.querySelector('[name="cf-turnstile-response"]').value;

if(!token){
alert("Please verify you are human");
return;
}

let params = {
fname: fname.value,
lname: lname.value,
email: email.value,
phone: phone.value,
offer: offer.value,
message: message.value
};

emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",params);

// SUCCESS UI
document.getElementById("form").style.display="none";
document.getElementById("successBox").style.display="block";

// TIMER
let time = 5;
let timer = document.getElementById("timer");

let countdown = setInterval(()=>{
time--;
timer.innerText = time;

if(time<=0){
clearInterval(countdown);
window.location.href = "/";
}
},1000);
}
</script>

</body>
</html>
